<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아크크 미션지 생성기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --brand-black: #0B1215;
    --brand-neon: #edff4b;
    --ed-bg: #18191b;
    --ed-surface: rgba(255,255,255,0.05);
    --ed-border: rgba(255,255,255,0.09);
    --ed-text: #e2e2e2;
    --ed-sub: rgba(255,255,255,0.38);
    --card-bg: #FEFEE8;
  }
  body { font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }
  .app { display: flex; height: 100vh; }

  /* ── EDITOR ── */
  .editor {
    width: 320px; flex-shrink: 0;
    background: var(--ed-bg); color: var(--ed-text);
    display: flex; flex-direction: column;
    border-right: 1px solid var(--ed-border); overflow: hidden;
  }
  .editor-top {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--ed-border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .editor-top-title { font-size: 14px; font-weight: 800; color: var(--brand-neon); }
  .editor-scroll {
    flex: 1; overflow-y: auto; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .editor-scroll::-webkit-scrollbar { width: 3px; }
  .editor-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .sec-label { font-size: 10px; font-weight: 700; color: var(--ed-sub); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; }
  .ig { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .ig label { font-size: 11px; font-weight: 600; color: var(--ed-sub); }
  .ig input, .ig select, .ig textarea {
    background: var(--ed-surface); border: 1px solid var(--ed-border);
    border-radius: 8px; padding: 8px 11px; color: var(--ed-text);
    font-family: inherit; font-size: 13px; outline: none; width: 100%;
  }
  .ig input:focus, .ig select:focus { border-color: var(--brand-neon); }
  .ig select option { background: #2a2a2a; }
  .ig textarea { resize: none; height: 52px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* challenge list editor */
  .challenge-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .challenge-input-row input {
    flex: 1; background: var(--ed-surface); border: 1px solid var(--ed-border);
    border-radius: 8px; padding: 7px 10px; color: var(--ed-text);
    font-family: inherit; font-size: 13px; outline: none;
  }
  .challenge-input-row input:focus { border-color: var(--brand-neon); }
  .btn-add-ch {
    background: rgba(237,255,75,0.12); border: 1px solid rgba(237,255,75,0.3);
    border-radius: 8px; padding: 7px 12px; color: var(--brand-neon);
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .btn-add-ch:hover { background: rgba(237,255,75,0.2); }
  .ch-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.07); border: 1px solid var(--ed-border);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; margin: 3px;
  }
  .ch-tag button {
    background: none; border: none; color: rgba(255,255,255,0.3);
    cursor: pointer; font-size: 13px; line-height: 1; padding: 0;
  }
  .ch-tag button:hover { color: #ff6b6b; }

  /* mission preview override */
  .mission-preview-row {
    display: flex; flex-direction: column; gap: 4px;
  }
  .mission-item-row { display: flex; gap: 4px; align-items: center; }
  .mission-item-row input {
    flex: 1; background: var(--ed-surface); border: 1px solid var(--ed-border);
    border-radius: 6px; padding: 6px 9px; color: var(--ed-text);
    font-family: inherit; font-size: 12px; outline: none;
  }
  .mission-item-row input:focus { border-color: var(--brand-neon); }
  .btn-del-m { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 14px; }
  .btn-del-m:hover { color: #ff6b6b; }

  /* editor footer */
  .editor-footer {
    padding: 12px 20px; border-top: 1px solid var(--ed-border); flex-shrink: 0;
    display: flex; flex-direction: column; gap: 6px;
  }
  .exp-btn {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .exp-btn.primary { background: var(--brand-neon); color: var(--brand-black); }
  .exp-btn.secondary { background: rgba(255,255,255,0.07); color: var(--ed-text); }
  .exp-btn-row { display: flex; gap: 6px; }
  .exp-btn-row .exp-btn { flex: 1; }

  /* ── PREVIEW ── */
  .preview-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .preview-tabs {
    display: flex; gap: 0; background: #111; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 0 20px;
  }
  .preview-tab {
    padding: 12px 18px; font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.35); cursor: pointer; border: none; background: none;
    font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .15s;
  }
  .preview-tab.active { color: var(--brand-neon); border-bottom-color: var(--brand-neon); }
  .preview-area {
    flex: 1; overflow: auto; background: #1a1a1a;
    display: flex; align-items: flex-start; justify-content: center; padding: 32px;
  }
  .card-scale-wrap { transform-origin: top left; }

  /* ── MISSION CARD ── */
  #mission-card {
    width: 800px;
    background: var(--card-bg);
    font-family: 'Pretendard', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* 패턴은 img 단일 요소로 처리 */
  .card-content { position: relative; z-index: 2; padding: 52px 52px 60px; }

  /* header */
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 40px;
  }
  .card-kisu {
    font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700;
    color: rgba(11,18,21,0.6); letter-spacing: .04em;
  }
  .card-logo-img { height: 36px; opacity: 0.85; }

  /* week */
  .card-week-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .card-week-num {
    font-family: 'Pretendard', sans-serif; font-size: 72px; font-weight: 900;
    color: var(--brand-black); line-height: 1; letter-spacing: -2px;
  }
  .card-week-label {
    font-size: 28px; font-weight: 900; color: var(--brand-black);
    letter-spacing: -0.5px;
  }
  .card-badges { display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; }
  .badge-theme {
    display: inline-block; padding: 6px 16px;
    background: var(--brand-black); color: var(--brand-neon);
    font-size: 13px; font-weight: 800; border-radius: 100px;
  }
  .badge-event {
    display: inline-block; padding: 6px 16px;
    background: rgba(11,18,21,0.08); color: var(--brand-black);
    font-size: 13px; font-weight: 700; border-radius: 100px;
  }

  /* mission section */
  .card-section { margin-bottom: 28px; }
  .card-section-title {
    font-size: 14px; font-weight: 800; color: var(--brand-black);
    letter-spacing: .04em;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card-section-title::after {
    content: ''; flex: 1; height: 1.5px; background: rgba(11,18,21,0.12);
  }
  .mission-list { display: flex; flex-direction: column; gap: 10px; }
  .mission-item {
    display: flex; align-items: center; gap: 12px;
    background: white; border-radius: 12px; padding: 14px 18px;
    box-shadow: 0 4px 0 rgba(11,18,21,0.18);
  }
  .mission-check {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--brand-neon); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mission-check svg { width: 12px; height: 12px; }
  .mission-text { font-size: 15px; font-weight: 700; color: var(--brand-black); }
  .mission-hint {
    display: block; margin-top: 5px;
    font-size: 13px; font-weight: 600; font-style: italic;
    color: rgba(11,18,21,0.45);
  }
  .mission-where {
    display: flex; align-items: flex-start; gap: 5px; margin-top: 8px;
    font-family: 'Gamja Flower', cursive;
    font-size: 14px; color: rgba(11,18,21,0.5); line-height: 1.4;
  }
  .mission-where img.where-ahha { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* challenge chips */
  .challenge-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .challenge-chip {
    display: inline-block; padding: 8px 16px;
    background: var(--brand-neon); border: none;
    border-radius: 100px; font-size: 14px; font-weight: 700; color: var(--brand-black);
    box-shadow: 0 4px 0 rgba(11,18,21,0.15);
  }

  /* free missions */
  .free-mission-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .free-mission-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: white; border-radius: 10px; padding: 11px 14px;
    font-size: 15px; font-weight: 600; color: rgba(11,18,21,0.7);
    box-shadow: 0 2px 8px rgba(11,18,21,0.04);
  }
  .free-mission-emoji { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
  .free-mission-body { display: flex; flex-direction: column; gap: 4px; line-height: 1.4; }
  .free-mission-where {
    font-size: 11px; font-weight: 700; color: rgba(11,18,21,0.35);
    letter-spacing: .04em;
  }
  .free-mission-where .where-pin { color: var(--brand-black); }

  /* completion */
  .card-completion {
    margin-top: 32px;
    background: var(--brand-black); border-radius: 16px;
    padding: 22px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .completion-icon { font-size: 28px; flex-shrink: 0; }
  .completion-text-label {
    font-size: 12px; font-weight: 700; color: rgba(237,255,75,0.85);
    letter-spacing: .06em; margin-bottom: 6px;
  }
  .completion-text {
    font-size: 19px; font-weight: 900; color: var(--brand-neon);
    line-height: 1.2;
  }
  .completion-sub {
    font-size: 13px; color: rgba(237,255,75,0.75); margin-top: 4px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── 편집 패널 ── -->
  <aside class="editor">
    <div class="editor-top">
      <span style="font-size:18px">📋</span>
      <span class="editor-top-title">미션지 생성기</span>
    </div>

    <div class="editor-scroll">

      <!-- 기본 정보 -->
      <div>
        <div class="sec-label">기본 정보</div>
        <div class="row2">
          <div class="ig">
            <label>기수</label>
            <input type="text" id="in-kisu" placeholder="1기" oninput="renderCard()">
          </div>
          <div class="ig">
            <label>주차</label>
            <select id="in-week" onchange="onWeekChange()">
              <option value="1">1주차</option>
              <option value="2">2주차</option>
              <option value="3">3주차</option>
              <option value="4">4주차 ⭐</option>
              <option value="5">5주차</option>
              <option value="6">6주차</option>
              <option value="7">7주차</option>
              <option value="8">8주차 ⭐</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 주간 미션 -->
      <div>
        <div class="sec-label">주간 미션</div>
        <div class="mission-preview-row" id="mission-items-editor"></div>
      </div>

      <!-- 챌린지 목록 (챌린지 주차만) -->
      <div id="challenge-section">
        <div class="sec-label">챌린지 목록</div>
        <div class="challenge-input-row">
          <input type="text" id="ch-input" placeholder="챌린지명 입력" onkeydown="if(event.key==='Enter'&&!event.isComposing)addChallenge()">
          <button class="btn-add-ch" onclick="addChallenge()">+ 추가</button>
        </div>
        <div id="ch-tags"></div>
      </div>

    </div>

    <div class="editor-footer">
      <div class="exp-btn-row">
        <button class="exp-btn secondary" onclick="saveToFile()">💾 저장</button>
        <button class="exp-btn secondary" onclick="document.getElementById('load-input').click()">📂 불러오기</button>
        <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadFromFile(this)">
      </div>
      <button class="exp-btn primary" onclick="exportImage()">🖼️ 이미지로 저장</button>
    </div>
  </aside>

  <!-- ── 미리보기 ── -->
  <div class="preview-wrap">
    <div class="preview-tabs">
      <button class="preview-tab active" onclick="switchTab('card')">📋 미션지</button>
      <button class="preview-tab" onclick="switchTab('free')">✨ 자유 미션 안내</button>
    </div>
    <main class="preview-area" id="preview-area">
      <!-- 미션지 탭 -->
      <div id="tab-card" class="card-scale-wrap" style="transform-origin:top left">
        <div id="mission-card"></div>
      </div>
      <!-- 자유 미션 안내 탭 -->
      <div id="tab-free" style="display:none; width:800px">
        <div id="free-mission-card"></div>
      </div>
    </main>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

/* ── SEEDED RANDOM ── */
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

/* ── PATTERN BACKGROUND — Canvas API로 렌더링 (html2canvas 호환) ── */
const patternCache = {};

async function buildPatternDataUrl(weekNum, H = 2200) {
  const cacheKey = `${weekNum}_${H}`;
  if (patternCache[cacheKey]) return patternCache[cacheKey];

  const W = 800;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#FEFEE8';
  ctx.fillRect(0, 0, W, H);

  const rand = seededRand(weekNum * 12345 + 9876);
  const cols = 5, rows = 9;
  const tasks = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // 지그재그: 짝수 행은 반 칸 오른쪽으로
      const offset = (r % 2 === 0) ? 0 : (W / cols / 2);
      const cx    = (c + 0.5) / cols * W + offset + (rand() - 0.5) * 0.04 * W;
      const cy    = (r + 0.5) / rows * H                + (rand() - 0.5) * 0.04 * H;
      const shape = SHAPES[Math.floor(rand() * SHAPES.length)];
      const color = COLORS[Math.floor(rand() * COLORS.length)];
      const size  = 28 + rand() * 10;
      const rot   = rand() * Math.PI * 2;
      const vbParts = shape.vb.split(' ');
      const vbW = parseFloat(vbParts[2]);
      const vbH = parseFloat(vbParts[3]);

      // 모양 하나를 SVG img로 만들어 canvas에 그리기
      const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${shape.vb}"><path d="${shape.d}" fill="${color}"/></svg>`;
      const imgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

      tasks.push(new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          // viewBox 비율 유지
          const ratio = vbW / vbH;
          const dw = ratio >= 1 ? size : size * ratio;
          const dh = ratio >= 1 ? size / ratio : size;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(rot);
          ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
          ctx.restore();
          resolve();
        };
        img.onerror = resolve;
        img.src = imgUrl;
      }));
    }
  }

  await Promise.all(tasks);

  // 딤 오버레이
  ctx.fillStyle = 'rgba(254,254,232,0.78)';
  ctx.fillRect(0, 0, W, H);

  const dataUrl = canvas.toDataURL('image/png');
  patternCache[cacheKey] = dataUrl;
  return dataUrl;
}

async function buildPattern(weekNum, cardHeight) {
  const dataUrl = await buildPatternDataUrl(weekNum, cardHeight);
  return `<img src="${dataUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0" alt="">`;
}

  const completionHtml = `
    <div class="card-completion">
      <div class="completion-icon">🎉</div>
      <div>
        <div class="completion-text-label">이번 주 미션 ${missions.length}개 완료 후</div>

        <div class="completion-sub">단톡방에 외쳐주세요 💬</div>
      </div>
    </div>`;

  // 먼저 패턴 없이 카드 렌더 → 실제 높이 측정
  document.getElementById('mission-card').innerHTML = `
    <img id="pattern-img" src="" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0" alt="">
    <div class="card-content">

  scaleCard();

  missions = [...data.missions];
  challenges = [];
  renderMissionEditor();
  renderChallengeSection();
  renderCard();
}

function renderMissionEditor() {
  const week = parseInt(document.getElementById('in-week').value);
  document.getElementById('mission-items-editor').innerHTML = missions.map((m, i) => {
    const text = typeof m === 'string' ? m : m.text;
    const where = typeof m === 'object' ? (m.where || '') : '';
    return `
    <div class="mission-item-row">
      <input value="${text}" oninput="missions[${i}]={...missions[${i}],text:this.value};renderCard()">
      <button class="btn-del-m" onclick="missions.splice(${i},1);renderMissionEditor();renderCard()">✕</button>
    </div>`;
  }).join('') +
    `<button class="btn-add-ch" style="margin-top:6px;width:100%" onclick="missions.push({text:'새 미션',where:''});renderMissionEditor();renderCard()">+ 미션 추가</button>`;
}

function renderChallengeSection() {
  const week = parseInt(document.getElementById('in-week').value);
  const sec = document.getElementById('challenge-section');
  sec.style.display = WEEK_DATA[week].isCh ? 'block' : 'none';
  renderChallengeTags();
}

function addChallenge() {
  const input = document.getElementById('ch-input');
  const val = input.value.trim();
  if (!val) return;
  challenges.push(val);
  input.value = '';
  renderChallengeTags();
  renderCard();
}

function removeChallenge(i) {
  challenges.splice(i, 1);
  renderChallengeTags();
  renderCard();
}

function renderChallengeTags() {
  document.getElementById('ch-tags').innerHTML = challenges.map((c, i) => `
    <span class="ch-tag">${c}<button onclick="removeChallenge(${i})">✕</button></span>`).join('');
}

/* ── SCALE ── */
function scaleCard() {
  const area = document.getElementById('preview-area');
  const wrap = document.getElementById('tab-card');
  const card = document.getElementById('mission-card');
  const availW = area.clientWidth - 64;
  const scale = Math.min(availW / 800, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = '800px';
  const scaledH = card.scrollHeight * scale;
  wrap.style.marginBottom = (scaledH - card.scrollHeight) + 'px';
}
window.addEventListener('resize', scaleCard);

/* ── EXPORT ── */
async function exportImage() {
  const card = document.getElementById('mission-card');
  const wrap = document.getElementById('card-scale-wrap');
  const prev = wrap.style.transform;
  wrap.style.transform = 'scale(1)';
  const logo = card.querySelector('.card-logo-img');
  if (logo) logo.style.opacity = '0';
  try {
    const canvas = await html2canvas(card, { scale:2, allowTaint:true, useCORS:false, backgroundColor:'#FFF5E8', logging:false });
    const kisu = document.getElementById('in-kisu').value.trim();
    const week = document.getElementById('in-week').value;
    const name = ['아크크', kisu, `${week}주차`, '미션지'].filter(Boolean).join(' ');
    const a = document.createElement('a');
    a.download = name + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) { alert('이미지 저장에 실패했어요.'); }
  finally {
    wrap.style.transform = prev;
    if (logo) logo.style.opacity = '';
  }
}

/* ── SAVE/LOAD ── */
function saveToFile() {
  const state = {
    kisu: document.getElementById('in-kisu').value,
    week: document.getElementById('in-week').value,
    missions, challenges,
  };
  const a = document.createElement('a');
  const kisu = state.kisu || '아크크';
  a.download = `${kisu} ${state.week}주차 미션지.json`;
  a.href = URL.createObjectURL(new Blob([JSON.stringify(state,null,2)], {type:'application/json'}));
  a.click();
}
function loadFromFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const s = JSON.parse(e.target.result);
      document.getElementById('in-kisu').value = s.kisu || '';
      document.getElementById('in-week').value = s.week || '1';
      missions = s.missions || [];
      challenges = s.challenges || [];
      renderMissionEditor();
      renderChallengeSection();
      renderCard();
    } catch { alert('파일을 불러오는 데 실패했어요.'); }
    input.value = '';
  };
  reader.readAsText(file);
}
