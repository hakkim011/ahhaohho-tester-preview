<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아하오호 메이커 작품집</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand-black: #0B1215;
    --brand-neon: #edff4b;
    --bg: #FFF8F0;
    --text-main: #1a1a1a;
    --text-sub: #666;
  }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--brand-neon);
    display: flex;
    align-items: center;
    padding: 24px 72px;
    position: relative;
    overflow: hidden;
  }
  .header-neon-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--brand-black);
    opacity: 0.15;
  }
  .header-logo { width: 120px; position: relative; z-index: 2; }

  /* 404 CONTENT */
  .error-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
    text-align: center;
  }

  .error-code {
    font-family: 'Poppins', sans-serif;
    font-size: 96px;
    font-weight: 900;
    color: var(--brand-black);
    opacity: 0.08;
    line-height: 1;
    margin-bottom: -16px;
  }

  .error-icon {
    font-size: 52px;
    margin-bottom: 8px;
  }

  .error-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
  }

  .error-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.7;
  }

  .app-btn {
    margin-top: 12px;
    display: inline-block;
    background: var(--brand-black);
    color: var(--brand-neon);
    font-size: 14px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .app-btn:hover { opacity: 0.85; }

  /* FOOTER */
  .footer { text-align: center; padding: 40px 20px; font-size: 13px; color: #bbb; }
  .footer strong { color: var(--brand-black); font-weight: 700; }

  @media (max-width: 700px) {
    .header { padding: 20px 32px; }
    .error-code { font-size: 72px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-neon-bar"></div>
  <img class="header-logo" src="Logo1.svg" onerror="this.style.display='none'">
</div>

<!-- 404 CONTENT -->
<div class="error-section">
  <div class="error-code">404</div>
  <div class="error-icon">📭</div>
  <div class="error-title">더 이상 존재하지 않는 작품집이에요</div>
  <div class="error-desc">링크가 만료되었거나 계정이 삭제된 것 같아요.</div>
</div>

<div class="footer">
  <strong>아하오호</strong>에서 만든 창작 기록 · futurelab.center
</div>

</body>
</html>
